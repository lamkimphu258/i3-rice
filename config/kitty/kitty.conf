# Dracula Kitty config.

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.5

disable_ligatures never
cursor_shape beam
cursor_blink_interval 0.6
cursor_stop_blinking_after 12.0

scrollback_lines 10000
wheel_scroll_multiplier 3.0
touch_scroll_multiplier 3.0

copy_on_select clipboard
strip_trailing_spaces smart
enable_audio_bell no
visual_bell_duration 0.08
window_alert_on_bell yes

confirm_os_window_close 0
remember_window_size yes
initial_window_width 110c
initial_window_height 30c
window_padding_width 8
placement_strategy center

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
active_tab_font_style bold
inactive_tab_font_style normal

foreground #f8f8f2
background #282a36
background_opacity 0.88
dynamic_background_opacity yes
selection_foreground #ffffff
selection_background #44475a

cursor #f8f8f2
cursor_text_color #282a36
url_color #8be9fd

active_border_color #ff79c6
inactive_border_color #6272a4
bell_border_color #ffb86c

active_tab_foreground #282a36
active_tab_background #bd93f9
inactive_tab_foreground #f8f8f2
inactive_tab_background #44475a
tab_bar_background #21222c

mark1_foreground #282a36
mark1_background #ff79c6
mark2_foreground #282a36
mark2_background #50fa7b
mark3_foreground #282a36
mark3_background #f1fa8c

color0 #21222c
color1 #ff5555
color2 #50fa7b
color3 #f1fa8c
color4 #bd93f9
color5 #ff79c6
color6 #8be9fd
color7 #f8f8f2
color8 #6272a4
color9 #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+w close_tab
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace restore_font_size

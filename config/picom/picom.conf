backend = "glx";
vsync = true;

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 6;

shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.24;

corner-radius = 0;
inactive-opacity = 0.96;
active-opacity = 1.0;
frame-opacity = 1.0;
detect-client-opacity = true;

blur-background = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-leader = true;
use-damage = true;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Dunst'",
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

opacity-rule = [
  "100:class_g = 'Rofi'",
  "100:class_g = 'Dunst'",
  "100:window_type = 'dock'"
];

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.98; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.98; };
  dropdown_menu = { opacity = 0.98; };
};
